<div class="user-layout">
  <!-- Top bar (mobile: compact, desktop: full header) -->
  <header class="user-header">
    <div class="header-container">
      <div class="logo">
        <span class="logo-icon">🏠</span>
        <span class="logo-text">PAC DMS</span>
      </div>

      <!-- Desktop nav -->
      <nav class="desktop-nav">
        <a routerLink="/my-leave-request" routerLinkActive="active" class="nav-item primary">
          <span class="nav-icon">📤</span>
          Request Leave
        </a>
        <a routerLink="/my-requests" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">📋</span>
          My Requests
        </a>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
          <span class="nav-icon">🏠</span>
          Home
        </a>
        <a routerLink="/my-room" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">🛏️</span>
          My Room
        </a>
        <a routerLink="/my-payments" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">💰</span>
          Payments
        </a>
        <a routerLink="/announcements" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">📢</span>
          Announcements
        </a>
      </nav>

      <div class="user-profile">
        <app-notification-dropdown />
        <a routerLink="/profile" class="profile-link" title="View Profile">
          @if (userPhotoUrl()) {
            <img class="avatar-photo" [src]="userPhotoUrl()" alt="Profile photo" />
          } @else {
            <div class="avatar">{{ userInitials() }}</div>
          }
          <span class="user-name">{{ userName() }}</span>
        </a>
        <button class="logout-btn" (click)="logout()" title="Logout">🚪</button>
      </div>
    </div>
  </header>

  <main class="user-content">
    <router-outlet />
  </main>

  <!-- Mobile bottom tab bar -->
  <nav class="bottom-tab-bar">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="tab-item">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">Home</span>
    </a>
    <a routerLink="/my-requests" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Requests</span>
    </a>
    <a routerLink="/my-leave-request" routerLinkActive="active" class="tab-item tab-primary">
      <span class="tab-icon-wrap">
        <span class="tab-icon">📤</span>
      </span>
      <span class="tab-label">Leave</span>
    </a>
    <a routerLink="/my-payments" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">💰</span>
      <span class="tab-label">Payments</span>
    </a>
    <a routerLink="/announcements" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📢</span>
      <span class="tab-label">More</span>
    </a>
  </nav>
</div>
