<div class="admin-layout" [class.sidebar-open]="isMobileSidebarOpen()">
  <!-- Mobile overlay -->
  @if (isMobileSidebarOpen()) {
    <div class="mobile-overlay" (click)="closeMobileSidebar()"></div>
  }

  <!-- Mobile header -->
  <header class="mobile-header">
    <button class="menu-toggle" (click)="toggleMobileSidebar()">
      <span>☰</span>
    </button>
    <span class="mobile-logo">
      @if (settingsService.systemLogo()) {
        <img class="logo-img" [src]="settingsService.systemLogo()" [alt]="settingsService.systemName()" />
      } @else {
        🏠
      }
      {{ settingsService.systemName() }}
    </span>
    <div class="header-right">
      <app-notification-dropdown />
      <button class="mobile-logout-btn" (click)="logout()" title="Logout">
        <span>🚪</span>
      </button>
    </div>
  </header>

  <app-sidebar [class.mobile-visible]="isMobileSidebarOpen()" (click)="handleSidebarClick($event)" />
  <main class="admin-content">
    <div class="desktop-top-bar">
      <app-notification-dropdown />
      <button class="logout-btn" (click)="logout()" title="Logout">
        <span class="logout-icon">🚪</span>
        <span class="logout-text">Logout</span>
      </button>
    </div>
    <router-outlet />
  </main>

  <!-- Mobile bottom tab bar -->
  <nav class="bottom-tab-bar">
    <a routerLink="/manage/dashboard" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📊</span>
      <span class="tab-label">Dashboard</span>
    </a>
    <a routerLink="/manage/residents" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">👥</span>
      <span class="tab-label">Residents</span>
    </a>
    <a routerLink="/manage/leave-requests" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Leaves</span>
    </a>
    <a routerLink="/manage/payments" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">💰</span>
      <span class="tab-label">Payments</span>
    </a>
    <button class="tab-item" (click)="toggleMobileSidebar()">
      <span class="tab-icon">☰</span>
      <span class="tab-label">More</span>
    </button>
  </nav>
</div>
