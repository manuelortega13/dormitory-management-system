<div class="parent-layout">
  <header class="header">
    <div class="header-left">
      <span class="logo">🏠 PAC DMS</span>
      <span class="role-badge">Parent Portal</span>
    </div>
    <div class="header-right">
      <app-notification-dropdown />
      <span class="user-name">{{ parentName }}</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </header>

  <!-- Desktop nav -->
  <nav class="nav desktop-nav">
    <a routerLink="/parent" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      📋 Pending Requests
    </a>
    <a routerLink="/parent/history" routerLinkActive="active">
      📜 History
    </a>
    <a routerLink="/parent/activity" routerLinkActive="active">
      📍 Activity
    </a>
    <a routerLink="/parent/payments" routerLinkActive="active">
      💰 Payments
    </a>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile bottom tab bar -->
  <nav class="bottom-tab-bar">
    <a routerLink="/parent" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="tab-item">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Requests</span>
    </a>
    <a routerLink="/parent/history" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📜</span>
      <span class="tab-label">History</span>
    </a>
    <a routerLink="/parent/activity" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📍</span>
      <span class="tab-label">Activity</span>
    </a>
    <a routerLink="/parent/payments" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">💰</span>
      <span class="tab-label">Payments</span>
    </a>
  </nav>
</div>
