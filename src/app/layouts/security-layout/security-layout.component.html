<div class="security-layout" [class.sidebar-open]="isSidebarOpen()">
  <!-- Mobile Header -->
  <header class="mobile-header">
    <button class="menu-toggle" (click)="toggleSidebar()">
      <span class="hamburger-icon">☰</span>
    </button>
    <div class="mobile-logo">
      <span class="logo-icon">🛡️</span>
      <span class="logo-text">PAC DMS Security</span>
    </div>
    <div class="header-right">
      <app-notification-dropdown />
    </div>
  </header>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>

  <aside class="security-sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">PAC DMS Security</span>
      </div>
      <button class="close-sidebar" (click)="closeSidebar()">✕</button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/security-guard/dashboard" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/security-guard/visitor-log" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Visitor Log</span>
      </a>
      <a routerLink="/security-guard/check-in-out" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Check In/Out</span>
      </a>
      <a routerLink="/security-guard/incidents" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">⚠️</span>
        <span class="nav-label">Incidents</span>
      </a>
      <a routerLink="/security-guard/emergency" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">🚨</span>
        <span class="nav-label">Emergency</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="guard-info">
        <div class="avatar">SG</div>
        <div class="guard-details">
          <span class="guard-name">Security Guard</span>
          <span class="guard-shift">Night Shift</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <span class="logout-icon">🚪</span>
        <span>Logout</span>
      </button>
    </div>
  </aside>
  <main class="security-content">
    <div class="desktop-notification-bar">
      <app-notification-dropdown />
    </div>
    <router-outlet />
  </main>

  <!-- Mobile bottom tab bar -->
  <nav class="bottom-tab-bar">
    <a routerLink="/security-guard/check-in-out" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">🚪</span>
      <span class="tab-label">Check</span>
    </a>
    <a routerLink="/security-guard/visitor-log" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📝</span>
      <span class="tab-label">Visitors</span>
    </a>
    <a routerLink="/security-guard/dashboard" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">📊</span>
      <span class="tab-label">Dashboard</span>
    </a>
    <a routerLink="/security-guard/incidents" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">⚠️</span>
      <span class="tab-label">Incidents</span>
    </a>
    <a routerLink="/security-guard/emergency" routerLinkActive="active" class="tab-item">
      <span class="tab-icon">🚨</span>
      <span class="tab-label">SOS</span>
    </a>
  </nav>
</div>
